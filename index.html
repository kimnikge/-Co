<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partners Accounting</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="page-header">
    <h1>Partners Accounting</h1>
    <div class="header-actions">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn-save" id="saveBtn">Сохранить</button>
    </div>
  </header>

  <main class="page-main">

    <section class="block">
      <h2 class="block__title">Бюджет — 2026</h2>
      <div class="block__body block__body--overflow">

        <div class="table-wrap">
          <table class="budget-table" id="budgetTable">
            <thead>
              <tr class="row-months">
                <th class="col-label">Месяц</th>
                <th>Янв</th>
                <th>Фев</th>
                <th>Март</th>
                <th>Апр</th>
                <th>Май</th>
                <th>Июнь</th>
                <th>Июль</th>
                <th>Авг</th>
                <th>Сент</th>
                <th>Окт</th>
                <th>Нояб</th>
                <th>Дек</th>
                <th class="col-total">Итого год</th>
              </tr>
            </thead>
            <tbody>

              <!-- Проект план -->
              <tr class="row-plan">
                <td class="col-label">Проект план</td>
                <td><input class="cell-input plan-input" data-month="1" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="2" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="3" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="4" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="5" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="6" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="7" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="8" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="9" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="10" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="11" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input plan-input" data-month="12" type="number" min="0" step="0.1" placeholder="0"></td>
                <td class="col-total"><span class="total-val" id="plan-total">—</span></td>
              </tr>

              <!-- Факт -->
              <tr class="row-fact">
                <td class="col-label">Факт</td>
                <td><input class="cell-input fact-input" data-month="1" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="2" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="3" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="4" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="5" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="6" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="7" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="8" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="9" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="10" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="11" type="number" min="0" step="0.1" placeholder="0"></td>
                <td><input class="cell-input fact-input" data-month="12" type="number" min="0" step="0.1" placeholder="0"></td>
                <td class="col-total"><span class="total-val" id="fact-total">—</span></td>
              </tr>

              <!-- Разница -->
              <tr class="row-diff">
                <td class="col-label">Разница</td>
                <td><span class="diff-val" data-month="1">—</span></td>
                <td><span class="diff-val" data-month="2">—</span></td>
                <td><span class="diff-val" data-month="3">—</span></td>
                <td><span class="diff-val" data-month="4">—</span></td>
                <td><span class="diff-val" data-month="5">—</span></td>
                <td><span class="diff-val" data-month="6">—</span></td>
                <td><span class="diff-val" data-month="7">—</span></td>
                <td><span class="diff-val" data-month="8">—</span></td>
                <td><span class="diff-val" data-month="9">—</span></td>
                <td><span class="diff-val" data-month="10">—</span></td>
                <td><span class="diff-val" data-month="11">—</span></td>
                <td><span class="diff-val" data-month="12">—</span></td>
                <td class="col-total"><span class="diff-val total-val" id="diff-total">—</span></td>
              </tr>

            </tbody>
          </table>
        </div>

      </div>
    </section>

            <tr><td class="cat-col-num">6</td><td><input class="cat-input-name" type="text" placeholder="—"></td><td><input class="cat-input-val" type="number" min="0" step="0.1" placeholder="0"></td><td><input class="cat-input-val" type="number" min="0" step="0.1" placeholder="0"></td></tr>

            <tr><td class="cat-col-num">3</td><td><input class="cat-input-name" type="text" placeholder="—"></td><td><input class="cat-input-val" type="number" min="0" step="0.1" placeholder="0"></td><td><input class="cat-input-val" type="number" min="0" step="0.1" placeholder="0"></td></tr>

      <div class="block__body">

          <thead>

          <tbody>
            <tr><td class="cat-col-num">1</td><td><input class="cat-input-name" type="text" placeholder="—"></td><td><input class="cat-input-val" type="number" min="0" step="0.1" placeholder="0"></td><td><input class="cat-input-val" type="number" min="0" step="0.1" placeholder="0"></td></tr>
